version: "3.9"

services:
  postgres:
    image: pgduckdb/pgduckdb:16-main
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-openestimate}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oe} -d ${POSTGRES_DB:-openestimate}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    # 🔥 FORCE correct runtime
    command: >
      sh -c "
      python3 -m uvicorn app.main:create_app
      --factory
      --host 0.0.0.0
      --port 8000
      "

    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oe}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openestimate}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-oe}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openestimate}
      REDIS_URL: ${REDIS_URL:-}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-openestimate}
      QDRANT_URL: http://qdrant:6333

    expose:
      - "8000"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

    # 🔥 FIX API connection
    environment:
      VITE_API_URL: http://backend:8000

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pg_data:
  qdrant_data:
